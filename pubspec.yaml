name: laco_ifsc_mobile
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  # Firebase
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  google_sign_in: ^6.2.1
  cloud_firestore: ^5.0.1
  firebase_storage: ^12.0.1
  # State
  provider: ^6.1.2
  # Location & Maps
  geolocator: ^13.0.0
